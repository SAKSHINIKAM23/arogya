services:
  - type: web
    name: aro-backend
    env: python
    region: ohio
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
    plan: free

  - type: web
    name: aro-frontend
    env: static
    region: ohio
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: aro-backend
          envVarKey: RENDER_EXTERNAL_URL
    plan: free
